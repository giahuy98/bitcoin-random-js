name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: '20'
          - os: ubuntu-latest
            node: '22'
          - os: windows-latest
            node: '20'
          - os: macos-15-intel
            node: '20'
          - os: macos-14
            node: '20'

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Show tool versions
        run: |
          node --version
          npm --version
          python --version
          cmake --version

      - name: Install npm dependencies
        run: npm install --ignore-scripts

      - name: Build prebuilt binary
        run: npm run build:prebuild

      - name: Run Node example against prebuild
        run: node example.js

      - name: Configure CMake example
        run: cmake -S . -B cmake-build

      - name: Build CMake example
        run: cmake --build cmake-build --config Release
