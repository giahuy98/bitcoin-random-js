name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - '20'
          - '22'

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Show tool versions
        run: |
          node --version
          npm --version
          python --version
          cmake --version

      - name: Build Node addon
        run: npm install

      - name: Run Node example
        run: node example.js

      - name: Configure CMake example
        run: cmake -S . -B cmake-build

      - name: Build CMake example
        run: cmake --build cmake-build --config Release
