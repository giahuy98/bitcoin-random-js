name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: '20'
          - os: ubuntu-latest
            node: '22'
          - os: windows-latest
            node: '20'
          - os: macos-15-intel
            node: '20'
          - os: macos-14
            node: '20'

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Show tool versions
        run: |
          node --version
          npm --version
          python --version
          cmake --version

      - name: Install npm dependencies
        run: npm install --ignore-scripts

      - name: Build prebuilt binary
        run: npm run build:prebuild

      - name: Run Node example against prebuild
        run: node example.js

      - name: Pack npm tarball
        run: npm pack

      - name: Test consumer install from tarball
        run: |
          TARBALL="bitcoin-random-js-$(node -p "require('./package.json').version").tgz"
          CONSUMER_DIR="$(mktemp -d)"
          cd "$CONSUMER_DIR"
          npm init -y
          npm install "${GITHUB_WORKSPACE}/${TARBALL}"
          if [ -f node_modules/bitcoin-random-js/build/Release/bitcoin_random_js.node ]; then
            echo "consumer install fell back to a local build"
            exit 1
          fi
          PREBUILDS_ONLY=1 node -e "const pkg = require('bitcoin-random-js'); const bytes = pkg.getStrongRandBytes(8); console.log(bytes.toString('hex'));"

      - name: Configure CMake example
        run: cmake -S . -B cmake-build

      - name: Build CMake example
        run: cmake --build cmake-build --config Release
